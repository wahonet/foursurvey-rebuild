spring:
  application:
    name: four-survey-rebuild-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:7306/four_survey_rebuild?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 18080

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  project-name: FS Rebuild Backend
  current-phase: 基础平台
  docs-path: G:/fourSurvey/FS-doc-bundle
  auth:
    token-expire-hours: 8
